spring:
  application:
    name: blt

  profiles:
    default: local

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

# Sentry
sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:local}
  traces-sample-rate: 0.0
  send-default-pii: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html

blt:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS}
  jwt:
    issuer: ${JWT_ISSUER:blt-api}
    secret: ${JWT_SECRET}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:60}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:30}
    verification-token-ttl-minutes: ${JWT_VERIFICATION_TOKEN_TTL_MINUTES:5}
  apple:
    issuer: ${APPLE_ISSUER:https://appleid.apple.com}
    client-id: ${APPLE_CLIENT_ID}
  fcm:
    enabled: ${FCM_ENABLED:false}
    credentials-path: ${FCM_CREDENTIALS_PATH:}
    project-id: ${FCM_PROJECT_ID:}
