spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/blt}
    username: ${DB_USERNAME:blt}
    password: ${DB_PASSWORD:bltscret}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
